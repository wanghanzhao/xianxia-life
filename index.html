<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>尘缘修仙录</title>
    <link rel="stylesheet" href="./styles.css?v=20260707-layout-v1" />
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <p class="eyebrow">文字修仙模拟人生</p>
          <h1>尘缘修仙录</h1>
        </div>
        <div class="top-actions">
          <button id="saveBtn" type="button">存档</button>
          <button id="newLifeBtn" type="button">转世</button>
        </div>
      </section>

      <section id="creation" class="creation">
        <div class="creation-panel">
          <h2>投身尘世</h2>
          <label>
            道号
            <input id="nameInput" maxlength="8" value="青玄" />
          </label>
          <div class="gender-select" id="genderSelect" aria-label="选择立绘"></div>
          <div class="origin-grid" id="originGrid"></div>
          <button id="startBtn" class="primary" type="button">入世修行</button>
        </div>
      </section>

      <section id="game" class="game hidden">
        <aside class="stats-panel" data-mobile-panel="details">
          <div class="portrait">
            <div class="avatar-frame">
              <img id="heroAvatar" src="./assets/characters/cultivator-male.png" alt="角色立绘" />
            </div>
            <div>
              <h2 id="heroName">青玄</h2>
              <p id="heroTitle">凡人</p>
            </div>
          </div>
          <div class="stat-list" id="statList"></div>
          <div class="bars">
            <div>
              <span>修为</span>
              <div class="bar"><i id="cultivationBar"></i></div>
            </div>
            <div>
              <span>心境</span>
              <div class="bar"><i id="mindBar"></i></div>
            </div>
          </div>
        </aside>

        <section class="main-panel" data-mobile-panel="cultivation">
          <div class="mobile-summary" id="mobileSummary" data-mobile-panel-child="cultivation"></div>

          <div class="year-card" data-mobile-panel-child="cultivation">
            <div>
              <p class="eyebrow">当前年岁</p>
              <strong id="ageText">16 岁</strong>
            </div>
            <div>
              <p class="eyebrow">天命</p>
              <strong id="fateText">未定</strong>
            </div>
            <button id="detailBtn" class="year-detail-btn" type="button">
              <span>详细</span>
              <strong>状态</strong>
            </button>
          </div>

          <div class="break-card break-card-main" data-mobile-panel-child="cultivation">
            <h3>破境条件</h3>
            <div id="breakNeed"></div>
          </div>

          <section class="action-board" data-mobile-panel-child="cultivation">
            <div class="section-head">
              <h2>行动</h2>
            </div>
            <div class="actions" id="actions"></div>
          </section>

          <article class="log-panel" data-mobile-panel-child="cultivation">
            <div class="log-head">
              <h2>修行纪年</h2>
              <button id="clearLogBtn" type="button">清空</button>
            </div>
            <div id="log" class="log"></div>
          </article>
        </section>

        <aside class="side-panel" data-mobile-panel="market">
          <div class="desktop-only" data-mobile-panel-child="details">
            <h2>资源与资质</h2>
            <div id="resourceGrid" class="resource-grid"></div>
          </div>
          <div class="quick-actions" data-mobile-panel-child="market">
            <button id="usePillBtn" type="button">服用丹药</button>
            <button id="buyPillBtn" type="button">购买常用丹</button>
            <button id="buyBreakPillBtn" type="button">求购破境丹</button>
            <button id="studyManualBtn" type="button">参悟残卷</button>
            <button id="restWithStoneBtn" type="button">灵石调息</button>
          </div>
          <div data-mobile-panel-child="market">
            <h2>交易行</h2>
            <div id="marketPanel" class="market-panel"></div>
          </div>
          <div data-mobile-panel-child="market">
            <h2>机缘与负累</h2>
            <div id="traits" class="traits"></div>
            <h2>行囊</h2>
            <div id="inventory" class="inventory"></div>
          </div>
        </aside>
      </section>

      <nav id="mobileTabs" class="mobile-tabs hidden" aria-label="移动端页签">
        <button data-tab="cultivation" type="button">修行</button>
        <button data-tab="market" type="button">坊市</button>
      </nav>

      <article id="choicePanel" class="choice-panel choice-float hidden">
        <p class="eyebrow">当下抉择</p>
        <h2 id="choiceTitle"></h2>
        <p id="choiceText"></p>
        <div id="choiceOptions" class="choice-options"></div>
      </article>

      <div id="detailModal" class="modal hidden" aria-hidden="true">
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
          <div class="modal-head">
            <h2 id="detailTitle">详细状态</h2>
            <button id="closeDetailBtn" type="button">关闭</button>
          </div>
          <div class="modal-body">
            <div class="portrait modal-portrait">
              <div class="avatar-frame">
                <img id="detailHeroAvatar" src="./assets/characters/cultivator-male.png" alt="角色立绘" />
              </div>
              <div>
                <h2 id="detailHeroName">青玄</h2>
                <p id="detailHeroTitle">凡人</p>
              </div>
            </div>
            <div id="detailStatList" class="stat-list"></div>
            <div class="bars">
              <div>
                <span>修为</span>
                <div class="bar"><i id="detailCultivationBar"></i></div>
              </div>
              <div>
                <span>心境</span>
                <div class="bar"><i id="detailMindBar"></i></div>
              </div>
            </div>
            <div class="break-card">
              <h3>破境条件</h3>
              <div id="detailBreakNeed"></div>
            </div>
            <h2>资源与资质</h2>
            <div id="detailResourceGrid" class="resource-grid"></div>
          </div>
        </section>
      </div>
      <div id="toastStack" class="toast-stack" aria-live="polite"></div>
    </main>

      <script src="./src/game.js?v=20260707-layout-v1"></script>
  </body>
</html>
